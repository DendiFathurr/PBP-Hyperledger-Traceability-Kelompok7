# ==============================================================================
# Docker Compose - Hyperledger Fabric Network
# Domain: logistik.com
# Organisasi:
#   - OrdererOrg  (orderer.logistik.com)
#   - Org1Eksportir (peer0.org1eksportir.logistik.com)
#   - Org2Importir  (peer0.org2importir.logistik.com)
# ==============================================================================

version: '2.4'

volumes:
  orderer.logistik.com:
  peer0.org1eksportir.logistik.com:
  peer0.org2importir.logistik.com:

networks:
  fabric_network:
    name: fabric_network

services:

  # ============================================================================
  #   ORDERER
  # ============================================================================
  orderer.logistik.com:
    container_name: orderer.logistik.com
    image: hyperledger/fabric-orderer:2.2
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      # TLS
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      # EtcdRaft
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/logistik.com/orderers/orderer.logistik.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/logistik.com/orderers/orderer.logistik.com/tls:/var/hyperledger/orderer/tls
      - orderer.logistik.com:/var/hyperledger/production/orderer
    ports:
      - 7050:7050
    networks:
      - fabric_network

  # ============================================================================
  #   CA Org1 Eksportir
  # ============================================================================
  ca.org1eksportir.logistik.com:
    container_name: ca.org1eksportir.logistik.com
    image: hyperledger/fabric-ca:1.5
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org1eksportir
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_TLS_CERTFILE=/etc/hyperledger/fabric-ca-server-config/ca.org1eksportir.logistik.com-cert.pem
      - FABRIC_CA_SERVER_TLS_KEYFILE=/etc/hyperledger/fabric-ca-server-config/priv_sk
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - 7054:7054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./crypto-config/peerOrganizations/org1eksportir.logistik.com/ca/:/etc/hyperledger/fabric-ca-server-config
    networks:
      - fabric_network

  # ============================================================================
  #   CA Org2 Importir
  # ============================================================================
  ca.org2importir.logistik.com:
    container_name: ca.org2importir.logistik.com
    image: hyperledger/fabric-ca:1.5
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org2importir
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_TLS_CERTFILE=/etc/hyperledger/fabric-ca-server-config/ca.org2importir.logistik.com-cert.pem
      - FABRIC_CA_SERVER_TLS_KEYFILE=/etc/hyperledger/fabric-ca-server-config/priv_sk
      - FABRIC_CA_SERVER_PORT=8054
    ports:
      - 8054:8054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./crypto-config/peerOrganizations/org2importir.logistik.com/ca/:/etc/hyperledger/fabric-ca-server-config
    networks:
      - fabric_network

  # ============================================================================
  #   CouchDB untuk Org1 Eksportir
  # ============================================================================
  couchdb0:
    container_name: couchdb0
    image: couchdb:3.1.1
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 5984:5984
    networks:
      - fabric_network

  # ============================================================================
  #   CouchDB untuk Org2 Importir
  # ============================================================================
  couchdb1:
    container_name: couchdb1
    image: couchdb:3.1.1
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 6984:5984
    networks:
      - fabric_network

  # ============================================================================
  #   PEER0 - Org1 Eksportir
  # ============================================================================
  peer0.org1eksportir.logistik.com:
    container_name: peer0.org1eksportir.logistik.com
    image: hyperledger/fabric-peer:2.2
    environment:
      # Core
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_network
      - FABRIC_LOGGING_SPEC=INFO
      # Peer
      - CORE_PEER_ID=peer0.org1eksportir.logistik.com
      - CORE_PEER_ADDRESS=peer0.org1eksportir.logistik.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1eksportir.logistik.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1eksportir.logistik.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1eksportir.logistik.com:7051
      - CORE_PEER_LOCALMSPID=Org1EksportirMSP
      # TLS
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      # CouchDB
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      # Gossip
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_PROFILE_ENABLED=true
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config/peerOrganizations/org1eksportir.logistik.com/peers/peer0.org1eksportir.logistik.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/org1eksportir.logistik.com/peers/peer0.org1eksportir.logistik.com/tls:/etc/hyperledger/fabric/tls
      - peer0.org1eksportir.logistik.com:/var/hyperledger/production
    ports:
      - 7051:7051
    depends_on:
      - orderer.logistik.com
      - couchdb0
    networks:
      - fabric_network

  # ============================================================================
  #   PEER0 - Org2 Importir
  # ============================================================================
  peer0.org2importir.logistik.com:
    container_name: peer0.org2importir.logistik.com
    image: hyperledger/fabric-peer:2.2
    environment:
      # Core
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_network
      - FABRIC_LOGGING_SPEC=INFO
      # Peer
      - CORE_PEER_ID=peer0.org2importir.logistik.com
      - CORE_PEER_ADDRESS=peer0.org2importir.logistik.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org2importir.logistik.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org2importir.logistik.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org2importir.logistik.com:9051
      - CORE_PEER_LOCALMSPID=Org2ImportirMSP
      # TLS
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      # CouchDB
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      # Gossip
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_PROFILE_ENABLED=true
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config/peerOrganizations/org2importir.logistik.com/peers/peer0.org2importir.logistik.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/org2importir.logistik.com/peers/peer0.org2importir.logistik.com/tls:/etc/hyperledger/fabric/tls
      - peer0.org2importir.logistik.com:/var/hyperledger/production
    ports:
      - 9051:9051
    depends_on:
      - orderer.logistik.com
      - couchdb1
    networks:
      - fabric_network

  # ============================================================================
  #   CLI - Fabric Tools (untuk operasional channel & chaincode)
  # ============================================================================
  cli:
    container_name: cli
    image: hyperledger/fabric-tools:2.2
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      # Default ke Org1Eksportir
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.org1eksportir.logistik.com:7051
      - CORE_PEER_LOCALMSPID=Org1EksportirMSP
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1eksportir.logistik.com/users/Admin@org1eksportir.logistik.com/msp
      # TLS
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1eksportir.logistik.com/peers/peer0.org1eksportir.logistik.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1eksportir.logistik.com/peers/peer0.org1eksportir.logistik.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1eksportir.logistik.com/peers/peer0.org1eksportir.logistik.com/tls/ca.crt
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - ../chaincode:/opt/gopath/src/github.com/chaincode
    depends_on:
      - orderer.logistik.com
      - peer0.org1eksportir.logistik.com
      - peer0.org2importir.logistik.com
    networks:
      - fabric_network
